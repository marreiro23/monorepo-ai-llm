services:
  postgres:
    image: postgres:16-alpine
    container_name: monorepo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monorepo_ai_llm}
      POSTGRES_USER: ${POSTGRES_USER:-monorepo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monorepo123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monorepo} -d ${POSTGRES_DB:-monorepo_ai_llm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  monorepo-ai-llm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: monorepo-ai-llm
    image: monorepo-ai-llm/monorepo-ai-llm:remote
    container_name: monorepo-ai-llm
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://monorepo:monorepo123@postgres:5432/monorepo_ai_llm}
    ports:
      - "${MONOREPO_AI_LLM_PORT:-3000}:3000"
    depends_on:
      - postgres
    restart: unless-stopped
    mem_limit: ${DEFAULT_MEMORY_LIMIT:-512m}
    mem_reservation: ${DEFAULT_MEMORY_RESERVATION:-256m}
    cpus: ${DEFAULT_CPU_LIMIT:-0.50}

  users-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: users-api
    image: monorepo-ai-llm/users-api:remote
    container_name: users-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://monorepo:monorepo123@postgres:5432/monorepo_ai_llm}
    ports:
      - "${USERS_API_PORT:-3001}:3001"
    depends_on:
      - postgres
    restart: unless-stopped
    mem_limit: ${DEFAULT_MEMORY_LIMIT:-512m}
    mem_reservation: ${DEFAULT_MEMORY_RESERVATION:-256m}
    cpus: ${DEFAULT_CPU_LIMIT:-0.50}

  llm-ops-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: llm-ops-api
    image: monorepo-ai-llm/llm-ops-api:remote
    container_name: llm-ops-api
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL:-postgresql://monorepo:monorepo123@postgres:5432/monorepo_ai_llm}
    ports:
      - "${LLM_OPS_API_PORT:-3002}:3002"
    depends_on:
      - postgres
    restart: unless-stopped
    mem_limit: ${DEFAULT_MEMORY_LIMIT:-512m}
    mem_reservation: ${DEFAULT_MEMORY_RESERVATION:-256m}
    cpus: ${DEFAULT_CPU_LIMIT:-0.50}

  sharepoint-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: sharepoint-api
    image: monorepo-ai-llm/sharepoint-api:remote
    container_name: sharepoint-api
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL:-postgresql://monorepo:monorepo123@postgres:5432/monorepo_ai_llm}
    ports:
      - "${SHAREPOINT_API_PORT:-3003}:3003"
    depends_on:
      - postgres
    restart: unless-stopped
    mem_limit: ${DEFAULT_MEMORY_LIMIT:-512m}
    mem_reservation: ${DEFAULT_MEMORY_RESERVATION:-256m}
    cpus: ${DEFAULT_CPU_LIMIT:-0.50}

  sync-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: sync-api
    image: monorepo-ai-llm/sync-api:remote
    container_name: sync-api
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: ${DATABASE_URL:-postgresql://monorepo:monorepo123@postgres:5432/monorepo_ai_llm}
    ports:
      - "${SYNC_API_PORT:-3004}:3004"
    depends_on:
      - postgres
    restart: unless-stopped
    mem_limit: ${DEFAULT_MEMORY_LIMIT:-512m}
    mem_reservation: ${DEFAULT_MEMORY_RESERVATION:-256m}
    cpus: ${DEFAULT_CPU_LIMIT:-0.50}

volumes:
  postgres_data:
